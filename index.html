<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>叹月祝福语qq群377397554</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 560px;
            margin: 0 auto;
            padding: 12px 16px;
            text-align: center;
            background: #f8f9fa;
        }
        /* 方案三：呼吸灯变色特效 */
        .custom-link {
            display: inline-block;
            margin: 8px 0 6px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            background: linear-gradient(90deg, #ff4d4d, #4caf50, #2196f3, #9c27b0, #ff4d4d);
            background-size: 300% 100%;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: breatheColor 4s ease infinite;
            transition: transform 0.2s;
        }
        @keyframes breatheColor {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .custom-link:hover, .custom-link:active {
            transform: scale(1.02);
        }
        /* 原有样式 */
        .text-box {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px 12px;
            margin: 12px 0;
            font-size: 20px;
            font-weight: bold;
            word-break: break-all;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            border: 1px solid #e9ecef;
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 6px 0 4px;
        }
        button {
            background: #0078d4;
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 15px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.1s, transform 0.05s;
            touch-action: manipulation;
        }
        button:active {
            transform: scale(0.96);
            opacity: 0.8;
        }
        .status {
            margin-top: 8px;
            font-size: 12px;
            min-height: 32px;
        }
        .counter { 
            color: #666; 
            margin-top: 6px; 
            font-size: 13px;
            font-weight: 500;
        }
        .jump-area {
            display: flex;
            gap: 6px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin: 8px 0 12px;
            background: #fff;
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid #e9ecef;
        }
        .jump-input {
            width: 65px;
            padding: 8px;
            border-radius: 30px;
            border: 1px solid #ccc;
            text-align: center;
            font-size: 15px;
        }
        .jump-btn {
            background: #6c757d;
            padding: 8px 16px;
            font-size: 14px;
        }
        .list-container {
            margin-top: 20px;
            text-align: left;
            border-top: 1px solid #e9ecef;
            padding-top: 16px;
        }
        .list-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            text-align: center;
            color: #333;
        }
        .blessing-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 480px;
            overflow-y: auto;
            padding: 2px;
        }
        .blessing-item {
            background: white;
            padding: 12px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #e0e0e0;
            font-size: 15px;
            line-height: 1.4;
            display: flex;
            align-items: center;
            gap: 10px;
            touch-action: manipulation;
        }
        .blessing-item:active {
            transform: scale(0.98);
            background: #e8f4fd;
        }
        .blessing-item.copied {
            background: #d4edda;
            border-color: #28a745;
            opacity: 0.9;
        }
        .blessing-num {
            color: #0078d4;
            font-weight: 600;
            min-width: 36px;
            font-size: 14px;
        }
        .blessing-text {
            color: #333;
            flex: 1;
            font-size: 15px;
            word-break: break-word;
        }
        .copy-status {
            font-size: 12px;
            color: #999;
            min-width: 52px;
            text-align: right;
            font-weight: 500;
        }
        .blessing-item.copied .copy-status {
            color: #28a745;
        }
        @media (max-width: 480px) {
            body { padding: 10px 14px; }
            .text-box { padding: 16px 10px; font-size: 18px; margin: 10px 0; }
            button { padding: 8px 14px; font-size: 14px; }
            .blessing-item { padding: 10px 12px; }
            .blessing-text { font-size: 14px; }
            .custom-link { font-size: 16px; }
        }
    </style>
</head>
<body>
    <!-- 带呼吸灯变色特效的超级链接 -->
    <a class="custom-link" href="https://app1.xin7.tech/bigclicker/publish/rbfQGsNgRt" target="_blank" rel="noopener noreferrer">
        📢 点击查看放开三国2全自动日常任务脚本
    </a>

    <div class="text-box" id="currentText">加载中...</div>
    <div class="button-group">
        <button id="copyBtn">📋 复制并切换到下一条</button>
        <button id="resetBtn">🔄 重置</button>
    </div>
    <div class="status" id="statusMsg"></div>
    <div class="counter" id="counter">第 1 / ? 条</div>
    <div class="jump-area">
        <span style="font-size:14px;">🔢 跳转到第</span>
        <input type="number" id="jumpInput" class="jump-input" min="1" max="999" placeholder="数字">
        <span style="font-size:14px;">条</span>
        <button id="jumpBtn" class="jump-btn">🎯 跳转</button>
    </div>
    <div class="list-container">
        <div class="list-title">
    📜 全部祝福语 
    <span style="font-size: 14px; font-weight: normal;">
        <a href="https://qm.qq.com/q/XzUpD6bcCQ" 
           target="_blank" 
           rel="noopener noreferrer"
           style="color: #0078d4; text-decoration: none; border-bottom: 1px dashed #0078d4;">
            放2自动任务脚本QQ群：377397554
        </a>
    </span>
</div>
        <div class="blessing-list" id="blessingList"><div style="text-align: center; padding: 20px;">加载中...</div></div>
    </div>

    <script>
        let texts = [], rawLines = [], copiedStatus = [], currentIndex = 0, isCopying = false;
        const currentTextEl = document.getElementById('currentText');
        const counterEl = document.getElementById('counter');
        const statusMsgEl = document.getElementById('statusMsg');
        const copyBtn = document.getElementById('copyBtn');
        const resetBtn = document.getElementById('resetBtn');
        const jumpBtn = document.getElementById('jumpBtn');
        const jumpInput = document.getElementById('jumpInput');
        const blessingListEl = document.getElementById('blessingList');

        function removeNumberPrefixAndTrim(line) { return line.replace(/^\d+\.\s*/, '').trim(); }
        function extractNumber(line) { const m = line.match(/^\d+/); return m ? m[0] : ''; }
        async function copyToClipboard(text) {
            const clean = text.trim();
            if (!clean) return false;
            try {
                await navigator.clipboard.writeText(clean);
                return true;
            } catch {
                const ta = document.createElement('textarea');
                ta.value = clean;
                document.body.appendChild(ta);
                ta.select();
                const ok = document.execCommand('copy');
                document.body.removeChild(ta);
                return ok;
            }
        }
        function escapeHtml(s) { return s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
        function renderBlessingList() {
            if (!rawLines.length) { blessingListEl.innerHTML = '<div style="text-align:center;padding:20px;">暂无祝福语</div>'; return; }
            blessingListEl.innerHTML = rawLines.map((line, idx) => {
                const num = extractNumber(line);
                const txt = removeNumberPrefixAndTrim(line);
                const cls = copiedStatus[idx] ? 'copied' : '';
                const st = copiedStatus[idx] ? '✓ 已复制' : '📋 点击';
                return `<div class="blessing-item ${cls}" data-index="${idx}" data-text="${escapeHtml(txt)}">
                            <span class="blessing-num">${num}</span>
                            <span class="blessing-text">${escapeHtml(txt)}</span>
                            <span class="copy-status">${st}</span>
                        </div>`;
            }).join('');
            document.querySelectorAll('.blessing-item').forEach(el => {
                el.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (isCopying) return;
                    const idx = parseInt(el.dataset.index);
                    const txt = el.dataset.text;
                    if (txt && !isNaN(idx)) {
                        isCopying = true;
                        const ok = await copyToClipboard(txt);
                        isCopying = false;
                        if (ok) {
                            if (!copiedStatus[idx]) { copiedStatus[idx] = true; renderBlessingList(); }
                            statusMsgEl.textContent = `✅ 已复制：${txt.length > 25 ? txt.slice(0,25)+'...' : txt}`;
                            setTimeout(() => { if (statusMsgEl.textContent.includes('已复制')) statusMsgEl.textContent = ''; }, 1500);
                        } else {
                            statusMsgEl.textContent = '❌ 复制失败';
                            setTimeout(() => { if (statusMsgEl.textContent.includes('复制失败')) statusMsgEl.textContent = ''; }, 1500);
                        }
                    }
                });
            });
        }
        async function loadTexts() {
            try {
                const resp = await fetch('texts.txt');
                const txt = await resp.text();
                rawLines = txt.split('\n').filter(l => l.trim());
                texts = rawLines.map(l => removeNumberPrefixAndTrim(l));
                copiedStatus = new Array(texts.length).fill(false);
                updateDisplay();
                renderBlessingList();
            } catch(e) {
                currentTextEl.textContent = '❌ 加载失败';
                blessingListEl.innerHTML = '<div style="text-align:center;padding:20px;">❌ 加载失败</div>';
            }
        }
        function updateDisplay() {
            if (!texts.length) { currentTextEl.textContent = '加载中...'; return; }
            if (currentIndex < texts.length) {
                currentTextEl.textContent = texts[currentIndex];
                counterEl.textContent = `第 ${currentIndex+1} / ${texts.length} 条`;
            } else {
                currentTextEl.textContent = '🎉 全部复制完毕！';
                counterEl.textContent = `已完成 ${texts.length} / ${texts.length} 条`;
            }
        }
        async function copyAndNext() {
            if (isCopying) return;
            if (!texts.length) { statusMsgEl.textContent = '❌ 尚未加载完成'; return; }
            if (currentIndex >= texts.length) { statusMsgEl.textContent = '✅ 已全部复制，点击重置可重新开始'; return; }
            isCopying = true;
            const txt = texts[currentIndex];
            const ok = await copyToClipboard(txt);
            isCopying = false;
            if (ok) {
                if (!copiedStatus[currentIndex]) { copiedStatus[currentIndex] = true; renderBlessingList(); }
                statusMsgEl.textContent = `✅ 已复制：${txt.length > 30 ? txt.slice(0,30)+'...' : txt}`;
                currentIndex++;
                updateDisplay();
                if (currentIndex === texts.length) statusMsgEl.innerHTML = '🎉 恭喜！所有内容已复制完成！<br>点击重置可重新开始';
            } else {
                statusMsgEl.textContent = '❌ 复制失败';
            }
            setTimeout(() => { if (statusMsgEl.textContent.includes('已复制') || statusMsgEl.textContent.includes('复制失败')) statusMsgEl.textContent = ''; }, 1500);
        }
        function reset() { currentIndex = 0; copiedStatus.fill(false); updateDisplay(); renderBlessingList(); statusMsgEl.textContent = '🔄 已重置'; setTimeout(() => { if (statusMsgEl.textContent.includes('已重置')) statusMsgEl.textContent = ''; }, 1500); }
        function jumpTo() {
            if (!texts.length) return;
            let t = parseInt(jumpInput.value);
            if (isNaN(t)) { statusMsgEl.textContent = `⚠️ 请输入数字（1-${texts.length}）`; return; }
            t = Math.max(1, Math.min(t, texts.length));
            currentIndex = t - 1;
            jumpInput.value = '';
            updateDisplay();
            statusMsgEl.textContent = `🔍 已跳转到第 ${t} 条`;
            setTimeout(() => { if (statusMsgEl.textContent.includes('已跳转到')) statusMsgEl.textContent = ''; }, 1500);
        }
        copyBtn.addEventListener('click', copyAndNext);
        resetBtn.addEventListener('click', reset);
        jumpBtn.addEventListener('click', jumpTo);
        loadTexts();
    </script>
</body>
</html>
