<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>叹月祝福语更新</title>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        .text-box {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 40px 20px;
            margin: 30px 0;
            font-size: 24px;
            font-weight: bold;
            word-break: break-all;
        }
        button {
            background: #0078d4;
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin: 0 8px;
        }
        button:hover { background: #106ebe; }
        .status {
            margin-top: 20px;
            color: green;
            font-size: 14px;
            min-height: 40px;
        }
        .counter { color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>📋 点击复制，自动切换</h2>
    <div class="text-box" id="currentText">加载中...</div>
    <button id="copyBtn">📋 复制并切换到下一条</button>
    <button id="resetBtn">🔄 重置</button>
    <div class="status" id="statusMsg"></div>
    <div class="counter" id="counter">第 1 / ? 条</div>

    <script>
    // 从 texts.txt 文件读取祝福语列表
    let texts = [];
    let currentIndex = 0;
    const currentTextEl = document.getElementById('currentText');
    const counterEl = document.getElementById('counter');
    const statusMsgEl = document.getElementById('statusMsg');
    const copyBtn = document.getElementById('copyBtn');
    const resetBtn = document.getElementById('resetBtn');

    // 加载文本文件
    async function loadTexts() {
        try {
            const response = await fetch('texts.txt');
            const content = await response.text();
            // 按换行分割，并过滤掉空行
            texts = content.split('\n').filter(line => line.trim() !== '');
            updateDisplay();
        } catch (error) {
            console.error('加载文本失败:', error);
            currentTextEl.textContent = '❌ 加载祝福语失败，请刷新重试';
        }
    }

    function updateDisplay() {
        if (texts.length === 0) {
            currentTextEl.textContent = '加载中...';
            return;
        }
        if (currentIndex < texts.length) {
            currentTextEl.textContent = texts[currentIndex];
            counterEl.textContent = `第 ${currentIndex + 1} / ${texts.length} 条`;
        } else {
            currentTextEl.textContent = '🎉 全部复制完毕！';
            counterEl.textContent = `已完成 ${texts.length} / ${texts.length} 条`;
        }
    }

    async function copyToClipboard(text) {
        try {
            await navigator.clipboard.writeText(text);
            return true;
        } catch (err) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            const success = document.execCommand('copy');
            document.body.removeChild(textarea);
            return success;
        }
    }

    async function copyAndNext() {
        if (texts.length === 0) {
            statusMsgEl.textContent = '❌ 祝福语尚未加载完成，请稍后再试';
            return;
        }
        if (currentIndex >= texts.length) {
            statusMsgEl.textContent = '✅ 所有内容都已复制过了！点击重置可重新开始';
            statusMsgEl.style.color = '#ff9800';
            return;
        }

        const currentText = texts[currentIndex];
        const copySuccess = await copyToClipboard(currentText);
        
        if (copySuccess) {
            statusMsgEl.textContent = `✅ 已复制：「${currentText.length > 30 ? currentText.substring(0, 30) + '...' : currentText}」`;
            statusMsgEl.style.color = 'green';
            currentIndex++;
            updateDisplay();
            if (currentIndex === texts.length) {
                statusMsgEl.innerHTML = '🎉 恭喜！所有内容已复制完成！<br>点击重置可重新开始';
            }
        } else {
            statusMsgEl.textContent = '❌ 复制失败，请检查权限';
            statusMsgEl.style.color = 'red';
        }
        
        setTimeout(() => {
            if (statusMsgEl.textContent.includes('已复制') || statusMsgEl.textContent.includes('复制失败')) {
                statusMsgEl.textContent = '';
            }
        }, 2000);
    }

    function reset() {
        currentIndex = 0;
        updateDisplay();
        statusMsgEl.textContent = '🔄 已重置，可以从第一条重新复制';
        statusMsgEl.style.color = '#0078d4';
        setTimeout(() => {
            if (statusMsgEl.textContent.includes('已重置')) {
                statusMsgEl.textContent = '';
            }
        }, 1500);
    }

    copyBtn.addEventListener('click', copyAndNext);
    resetBtn.addEventListener('click', reset);
    
    // 页面加载时读取文本文件
    loadTexts();
</script>
</body>
</html>
