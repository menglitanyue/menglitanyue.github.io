            padding: 20px;
            text-align: center;
        }
        .text-box {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 40px 20px;
            margin: 30px 0;
            font-size: 24px;
            font-weight: bold;
            word-break: break-all;
        }
        button {
            background: #0078d4;
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin: 0 8px;
        }
        button:hover { background: #106ebe; }
        .status {
            margin-top: 20px;
            color: green;
            font-size: 14px;
            min-height: 40px;
        }
        .counter { color: #666; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="text-box" id="currentText">加载中...</div>
    <button id="copyBtn">📋 复制并切换到下一条</button>
    <button id="resetBtn">🔄 重置</button>
    <div class="status" id="statusMsg"></div>
    <div class="counter" id="counter">第 1 / ? 条</div>

    <script>

    "最爱湖东行不足",

    "你们去踏青姜维守家",
    "庞统要去踏青刷小怪了",
    "曹丕要带我去踏青打猎",
    "踏青季已到春色入画来",
    "你们去踏青我要去统一三国",
    "雨晴原草新",

    "桃花薰日红浓淡",
    "柳叶迷烟翠浅深"

        // =============================================

        let currentIndex = 0;      // 当前是第几条（从0开始）
        const currentTextEl = document.getElementById('currentText');
        const counterEl = document.getElementById('counter');
        const statusMsgEl = document.getElementById('statusMsg');
        const copyBtn = document.getElementById('copyBtn');
        const resetBtn = document.getElementById('resetBtn');

        // 更新页面显示
        function updateDisplay() {
            if (currentIndex < texts.length) {
                currentTextEl.textContent = texts[currentIndex];
                counterEl.textContent = `第 ${currentIndex + 1} / ${texts.length} 条`;
            } else {
                currentTextEl.textContent = '🎉 全部复制完毕！';
                counterEl.textContent = `已完成 ${texts.length} / ${texts.length} 条`;
            }
        }

        // 复制当前文字到剪贴板（兼容所有浏览器）
        async function copyToClipboard(text) {
            try {
                // 现代浏览器推荐方式
                await navigator.clipboard.writeText(text);
                return true;
            } catch (err) {
                // 降级方案（旧浏览器）
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                const success = document.execCommand('copy');
                document.body.removeChild(textarea);
                return success;
            }
        }

        // 核心功能：复制当前文字，然后切换到下一条
        async function copyAndNext() {
            // 如果已经全部复制完了
            if (currentIndex >= texts.length) {
                statusMsgEl.textContent = '✅ 所有内容都已复制过了！点击重置可重新开始';
                statusMsgEl.style.color = '#ff9800';
                return;
            }

            const currentText = texts[currentIndex];
            
            // 1. 复制当前文字
            const copySuccess = await copyToClipboard(currentText);
            
            if (copySuccess) {
                // 2. 显示成功提示
                statusMsgEl.textContent = `✅ 已复制：「${currentText.length > 30 ? currentText.substring(0, 30) + '...' : currentText}」`;
                statusMsgEl.style.color = 'green';
                
                // 3. 切换到下一条
                currentIndex++;
                updateDisplay();
                
                // 4. 如果全部完成，显示特殊提示
                if (currentIndex === texts.length) {
                    statusMsgEl.innerHTML = '🎉 恭喜！所有内容已复制完成！<br>点击重置可重新开始';
                }
            } else {
                statusMsgEl.textContent = '❌ 复制失败，请检查权限';
                statusMsgEl.style.color = 'red';
            }
            
            // 3秒后清除提示文字
            setTimeout(() => {
                if (statusMsgEl.textContent.includes('已复制') || statusMsgEl.textContent.includes('复制失败')) {
                    statusMsgEl.textContent = '';
                }
            }, 2000);
        }

        // 重置功能：从第一条重新开始
        function reset() {
            currentIndex = 0;
            updateDisplay();
            statusMsgEl.textContent = '🔄 已重置，可以从第一条重新复制';
            statusMsgEl.style.color = '#0078d4';
            setTimeout(() => {
                if (statusMsgEl.textContent.includes('已重置')) {
                    statusMsgEl.textContent = '';
                }
            }, 1500);
        }

        // 绑定事件
        copyBtn.addEventListener('click', copyAndNext);
        resetBtn.addEventListener('click', reset);
        
        // 初始化显示
        updateDisplay();
    </script>
</body>
</html>
